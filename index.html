<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Art Maker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="scanlines"></div>
    <div class="app">
        <header>
            <div class="title-wrap">
                <span class="pixel-icon">&#9724;</span>
                <h1>Pixel Art Maker</h1>
                <span class="pixel-icon">&#9724;</span>
            </div>
            <div class="subtitle">Click cells to draw &bull; Drag to paint &bull; Ctrl+S to save</div>
        </header>

        <div class="toolbar">
            <div class="tool-group">
                <label>Tool</label>
                <div class="tool-buttons">
                    <button class="tool-btn active" data-tool="pencil" title="Pencil (1)">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
                    </button>
                    <button class="tool-btn" data-tool="eraser" title="Eraser (2)">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/></svg>
                    </button>
                    <button class="tool-btn" data-tool="fill" title="Fill Bucket (3)">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m19 11-8-8-8.6 8.6a2 2 0 0 0 0 2.8l5.2 5.2c.8.8 2 .8 2.8 0L19 11Z"/><path d="m5 2 5 5"/><path d="M2 13h15"/><path d="M22 20.3c0 .8-.7 1.7-1.5 1.7s-1.5-.9-1.5-1.7c0-.8 1.5-2.8 1.5-2.8s1.5 2 1.5 2.8Z"/></svg>
                    </button>
                    <button class="tool-btn" data-tool="eyedropper" title="Eyedropper (4)">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m2 22 1-1h3l9-9"/><path d="M3 21v-3l9-9"/><path d="m15 6 3.4-3.4a2.1 2.1 0 1 1 3 3L18 9"/></svg>
                    </button>
                    <button class="tool-btn" data-tool="line" title="Line (5)">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="19" x2="19" y2="5"/></svg>
                    </button>
                    <button class="tool-btn" data-tool="rect" title="Rectangle (6)">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="1"/></svg>
                    </button>
                    <button class="tool-btn" data-tool="rectFill" title="Filled Rectangle (7)">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="1"/></svg>
                    </button>
                    <button class="tool-btn" data-tool="circle" title="Ellipse (8)">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="12" rx="10" ry="7"/></svg>
                    </button>
                    <button class="tool-btn" data-tool="circleFill" title="Filled Ellipse (9)">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="12" rx="10" ry="7"/></svg>
                    </button>
                    <button class="tool-btn" data-tool="selection" title="Selection (0)">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-dasharray="4 2"><rect x="3" y="3" width="18" height="18" rx="1"/></svg>
                    </button>
                </div>
            </div>

            <div class="tool-group">
                <label>Grid</label>
                <div class="slider-wrap">
                    <input type="range" id="gridSize" min="4" max="64" value="16">
                    <span class="slider-value" id="gridSizeValue">16</span>
                </div>
                <button class="btn btn-small btn-onion" id="gridToggleBtn" title="Toggle Grid (G)">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
                </button>
                <input type="range" id="gridOpacity" min="0" max="50" value="12" style="width: 50px;">
                <span class="slider-value" id="gridOpacityValue">12%</span>
            </div>

            <div class="tool-group">
                <label>Zoom</label>
                <div class="slider-wrap">
                    <input type="range" id="zoom" min="1" max="32" value="16">
                    <span class="slider-value" id="zoomValue">16x</span>
                </div>
            </div>

            <div class="tool-group actions">
                <button class="btn btn-ghost" id="clearBtn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                    Clear
                </button>
                <button class="btn btn-primary" id="downloadBtn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Save PNG
                </button>
                <button class="btn btn-gif" id="exportGifBtn" title="Export animated GIF">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2"/><path d="M7 2v20"/><path d="M17 2v20"/><path d="M2 12h20"/><path d="M2 7h5"/><path d="M2 17h5"/><path d="M17 7h5"/><path d="M17 17h5"/></svg>
                    Export GIF
                </button>
                <button class="btn" id="exportSpriteSheetBtn" title="Export Sprite Sheet">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                    Export Sheet
                </button>
                <button class="btn" id="importSpriteSheetBtn" title="Import Sprite Sheet">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    Import Sheet
                </button>
            </div>
        </div>

        <div class="main-content">
            <div class="canvas-area">
                <div class="canvas-container" id="canvasContainer">
                    <canvas id="pixelCanvas"></canvas>
                    <canvas id="gridOverlay"></canvas>
                </div>
                <div class="coords" id="coords">0, 0</div>
            </div>

            <div class="sidebar">
                <div class="panel color-palette">
                    <h3>Colors</h3>
                    <div class="colors" id="colorPalette"></div>
                    <div class="custom-color">
                        <input type="color" id="customColor" value="#000000">
                        <button class="btn btn-small" id="addColorBtn">Add</button>
                    </div>
                </div>

                <div class="panel recent-colors">
                    <h3>Recent</h3>
                    <div class="colors" id="recentColors"></div>
                </div>

                <div class="panel current-color-panel">
                    <h3>Current</h3>
                    <div class="current-color-preview" id="currentColorPreview">
                        <div class="current-color-swatch" id="currentSwatch"></div>
                        <span class="current-color-hex" id="currentHex">#000000</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="timeline">
            <div class="timeline-controls">
                <button class="btn btn-small" id="prevFrameBtn" title="Previous Frame">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                </button>
                <button class="btn btn-small btn-play" id="playBtn" title="Play/Pause (Space)">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="playIcon"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="pauseIcon" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                </button>
                <button class="btn btn-small" id="nextFrameBtn" title="Next Frame">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
                </button>

                <div class="timeline-sep"></div>

                <button class="btn btn-small" id="addFrameBtn" title="Add Frame">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                </button>
                <button class="btn btn-small" id="dupFrameBtn" title="Duplicate Frame">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="8" y="8" width="12" height="12" rx="2"/><path d="M16 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2"/></svg>
                </button>
                <button class="btn btn-small btn-danger" id="delFrameBtn" title="Delete Frame">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg>
                </button>

                <div class="timeline-sep"></div>

                <button class="btn btn-small btn-onion" id="onionSkinBtn" title="Onion Skinning (O)">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></svg>
                </button>

                <button class="btn btn-small btn-onion" id="symmetryBtn" title="Symmetry: none (X)">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v18"/><path d="M8 8l-5 4 5 4"/><path d="M16 8l5 4-5 4"/></svg>
                </button>

                <div class="tool-group fps-control">
                    <label>FPS</label>
                    <input type="range" id="fpsSlider" min="1" max="24" value="8">
                    <span class="slider-value" id="fpsValue">8</span>
                </div>

                <div class="tool-group fps-control onion-skin-control" style="display: none;">
                    <label>Onion Prev</label>
                    <input type="range" id="onionPrevOpacity" min="0" max="100" value="30" style="width: 60px;">
                    <span class="slider-value" id="onionPrevValue">30%</span>
                </div>

                <div class="tool-group fps-control onion-skin-control" style="display: none;">
                    <label>Onion Next</label>
                    <input type="range" id="onionNextOpacity" min="0" max="100" value="30" style="width: 60px;">
                    <span class="slider-value" id="onionNextValue">30%</span>
                </div>

                <span class="frame-counter" id="frameCounter">1 / 1</span>
            </div>

            <div class="timeline-frames" id="timelineFrames">
                <!-- frame thumbnails rendered here -->
            </div>
        </div>
    </div>

    <script src="gif.js"></script>
    <script src="app.js"></script>
</body>
</html>
